name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Export static site
        run: npm run export
      - name: Validate public content across every main tab
        run: npm run --silent public:validate -- --output="$RUNNER_TEMP/public-integrity.json"
      - name: Upload public integrity evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: public-integrity-${{ github.run_id }}
          path: ${{ runner.temp }}/public-integrity.json
          if-no-files-found: ignore
          retention-days: 7
      - name: Build
        run: npm run build
