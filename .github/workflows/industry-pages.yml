name: Deploy medical health data site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/industry-pages.yml"
      - "industry-packs/medical-health-data-elements/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "web/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: medical-health-data-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:./var/medical-health-pages.db
      INDUSTRY_PROFILE: medical-health-data-elements
      REPOSITORY_SNAPSHOT_PATH: industry-packs/medical-health-data-elements/data/snapshot.json
      PUBLIC_SITE_URL: https://chriswang.github.io/agent-pulse/
      GITHUB_REPOSITORY_URL: https://github.com/chriswang/agent-pulse
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Restore the isolated industry snapshot
        run: npm run db:snapshot -- restore
      - name: Export the industry site
        run: npm run export -- --skip-seed
      - name: Validate the public artifact
        shell: bash
        run: |
          set -euo pipefail
          npm run --silent public:validate
          test -s dist/index.html
          test -s dist/data/industry-pilot.json
          grep -F '医疗健康数据要素情报站' dist/index.html >/dev/null
          node -e 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"))' dist/data/industry-pilot.json
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
